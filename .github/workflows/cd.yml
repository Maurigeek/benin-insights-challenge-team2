name: CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_BRANCH: ${{ github.ref_name }}
          REPO_SLUG: ${{ github.repository }}
          DASHBOARD_PORT: 8503
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DEPLOY_BRANCH,REPO_SLUG,DASHBOARD_PORT
          script: |
            set -e
            REPO_DIR="$HOME/benin-insights"
            REPO_URL="git@github.com:$REPO_SLUG.git"

            if [ ! -d "$REPO_DIR/.git" ]; then
              echo "-- Clone repo --"
              git clone "$REPO_URL" "$REPO_DIR"
            fi

            cd "$REPO_DIR"

            echo "-- git pull --"
            git stash || true
            git fetch origin
            git checkout "$DEPLOY_BRANCH"
            git pull origin "$DEPLOY_BRANCH"

            echo "-- Build & deploy --"
            EXISTING_CONTAINERS=$(docker ps -q --filter "publish=${DASHBOARD_PORT:-8503}")
            if [ -n "$EXISTING_CONTAINERS" ]; then
              echo "-- Free port ${DASHBOARD_PORT:-8503} --"
              docker rm -f $EXISTING_CONTAINERS
            fi
            docker compose -f docker-compose.streamlit.yml build
            docker compose -f docker-compose.streamlit.yml down --remove-orphans 2>/dev/null || true
            docker compose -f docker-compose.streamlit.yml up -d --force-recreate

            echo "-- Clean old images --"
            docker image prune -f

            echo "-- Verify dashboard health --"
            sleep 10
            DASHBOARD_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${DASHBOARD_PORT:-8503}/_stcore/health)
            if [ "$DASHBOARD_STATUS" = "200" ]; then
              echo "Dashboard healthy (HTTP $DASHBOARD_STATUS)"
            else
              echo "Dashboard not responding (HTTP $DASHBOARD_STATUS)" && exit 1
            fi