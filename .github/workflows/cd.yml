name: CD

on:
  push:
    branches:
      - main
      - "1-feat-**"

env:
  REGISTRY: ghcr.io
  DASHBOARD_IMAGE: ghcr.io/${{ env.OWNER_LOWER }}/benin-insights-dashboard

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER_LOWER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.streamlit
          push: true
          tags: |
            ${{ env.DASHBOARD_IMAGE }}:latest
            ${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: [build-dashboard]
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          envs: GITHUB_TOKEN
          script: |
            set -e
            cd "${{ secrets.VPS_DEPLOY_PATH }}"

            echo "-- git pull --"
            git fetch origin
            git checkout main
            git pull origin main

            echo "-- GHCR login --"
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            echo "-- Deploy dashboard --"
            docker compose -f docker-compose.streamlit.yml pull
            docker compose -f docker-compose.streamlit.yml down --remove-orphans 2>/dev/null || true
            docker compose -f docker-compose.streamlit.yml up -d

            echo "-- Clean old images --"
            docker image prune -f

            echo "-- Verify dashboard health --"
            DASHBOARD_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${DASHBOARD_PORT:-8501}/_stcore/health)
            if [ "$DASHBOARD_STATUS" = "200" ]; then
              echo "Dashboard healthy (HTTP $DASHBOARD_STATUS)"
            else
              echo "Dashboard not responding (HTTP $DASHBOARD_STATUS)" && exit 1
            fi
