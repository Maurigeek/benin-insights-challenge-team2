name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Gate on test suite
        run: python -m pytest -q

      - name: Trigger deployment hook
        if: ${{ secrets.DEPLOY_HOOK_URL != '' }}
        env:
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
        run: curl -fsSL -X POST "$DEPLOY_HOOK_URL"

      - name: Skip when deployment hook is missing
        if: ${{ secrets.DEPLOY_HOOK_URL == '' }}
        run: echo "DEPLOY_HOOK_URL is not configured. Skipping deployment trigger."

      - name: Verify deployed app health
        if: ${{ secrets.DEPLOY_HEALTHCHECK_URL != '' }}
        env:
          DEPLOY_HEALTHCHECK_URL: ${{ secrets.DEPLOY_HEALTHCHECK_URL }}
        run: |
          for attempt in 1 2 3 4 5; do
            if curl -fsSL "$DEPLOY_HEALTHCHECK_URL" > /dev/null; then
              exit 0
            fi
            sleep 15
          done
          exit 1

      - name: Skip healthcheck when URL is missing
        if: ${{ secrets.DEPLOY_HEALTHCHECK_URL == '' }}
        run: echo "DEPLOY_HEALTHCHECK_URL is not configured. Skipping healthcheck."
